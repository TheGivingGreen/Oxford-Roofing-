<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portfolio — Oxford Roofing</title>
  <link rel="stylesheet" href="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/tokens/fonts.css">
  <link rel="stylesheet" href="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/tokens/colors.css">
  <link rel="stylesheet" href="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/tokens/typography.css">
  <link rel="stylesheet" href="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/tokens/spacing.css">
  <link rel="stylesheet" href="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/tokens/effects.css">
  <link rel="stylesheet" href="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/styles.css">
  <script src="_ds/oxford-roofing-design-system-4ccde329-304b-4da2-bae1-f4d68d986631/_ds_bundle.js"></script>
  <style>
    body{margin:0} *{box-sizing:border-box} a{color:inherit}
    .oxr-photo{position:relative;overflow:hidden;background:repeating-linear-gradient(135deg,var(--slate-200) 0px,var(--slate-200) 2px,var(--slate-100) 2px,var(--slate-100) 46px)}
    .oxr-photo-dark{background:linear-gradient(165deg,var(--navy-800),var(--navy-900) 65%),repeating-linear-gradient(135deg,rgba(255,255,255,0.05) 0px,rgba(255,255,255,0.05) 1px,transparent 1px,transparent 44px)}
    .oxr-photo-cap{position:absolute;left:20px;bottom:16px;font:600 11px/1 var(--font-sans);letter-spacing:0.14em;text-transform:uppercase;color:var(--slate-500)}
    .oxr-filter{font:600 13px/1 var(--font-sans);letter-spacing:0.04em;padding:10px 20px;border-radius:var(--radius-pill);border:1px solid var(--border-default);background:transparent;color:var(--text-heading);cursor:pointer;transition:background-color var(--duration-base) var(--ease-standard),color var(--duration-base) var(--ease-standard),border-color var(--duration-base) var(--ease-standard)}
    .oxr-filter-active{background:var(--navy-900);border-color:var(--navy-900);color:var(--white)}
  </style>
</helmet>

<x-import component-from-global-scope="OxfordRoofingDesignSystem_4ccde3.NavBar" logo-src="./assets/oxford-roofing-logo.png" links="{{ navLinks }}" cta-label="Request an Inspection" on-cta-click="{{ handleCta }}" hint-size="100%,74px"></x-import>

<section data-screen-label="Portfolio / Hero" style="position:relative;min-height:40vh;display:flex;align-items:flex-end" class="oxr-photo oxr-photo-dark">
  <div style="position:relative;z-index:2;max-width:var(--container-max);margin:0 auto;width:100%;padding:0 40px 56px;color:var(--white)">
    <div style="font:600 12px/1 var(--font-sans);letter-spacing:0.18em;text-transform:uppercase;color:var(--gold-400);margin-bottom:20px">Our Work</div>
    <h1 style="font-family:var(--font-serif-display);font-weight:600;font-size:clamp(32px,4.6vw,50px);margin:0;max-width:760px">Transformative roofs, exceptional results.</h1>
  </div>
</section>

<x-import component-from-global-scope="OxfordRoofingDesignSystem_4ccde3.Section" tone="light" hint-size="100%,1000px">
  <div style="display:flex;gap:12px;margin-bottom:48px;flex-wrap:wrap">
    <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
      <button class="{{ f.cls }}" onClick="{{ f.onClick }}">{{ f.label }}</button>
    </sc-for>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:24px">
    <sc-for list="{{ visibleProjects }}" as="p" hint-placeholder-count="6">
      <a href="{{ p.href }}" style="text-decoration:none;color:inherit">
        <div class="oxr-photo" style="height:260px;border-radius:var(--radius-lg);position:relative"><span class="oxr-photo-cap">{{ p.caption }}</span></div>
        <div style="padding-top:16px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
          <div>
            <div style="font:600 17px/1.3 var(--font-sans);color:var(--text-heading)">{{ p.title }}</div>
            <div style="font:400 14px/1.5 var(--font-sans);color:var(--text-muted);margin-top:4px">{{ p.subtitle }}</div>
          </div>
          <x-import component-from-global-scope="OxfordRoofingDesignSystem_4ccde3.Badge" tone="{{ p.badgeTone }}" hint-size="auto,26px">{{ p.category }}</x-import>
        </div>
      </a>
    </sc-for>
  </div>
</x-import>

<div style="background:var(--navy-900);color:var(--white);padding:100px 40px;text-align:center">
  <h2 style="font-family:var(--font-serif-display);font-weight:600;font-size:clamp(28px,3.6vw,40px);margin:0 0 24px">Want results like these on your roof?</h2>
  <x-import component-from-global-scope="OxfordRoofingDesignSystem_4ccde3.Button" variant="accent" size="lg" on-click="{{ handleCta }}" hint-size="240px,52px">Request an Inspection</x-import>
</div>

<x-import component-from-global-scope="OxfordRoofingDesignSystem_4ccde3.Footer" logo-src="./assets/oxford-roofing-logo.png" hint-size="100%,320px"></x-import>

</x-dc>
<script type="text/x-dc" data-dc-script>
const PROJECTS = [
  { slug: 'ladue-slate-restoration', title: 'Ladue Slate Restoration', subtitle: 'Residential · Synthetic slate', category: 'Residential', caption: 'Photography — synthetic slate, Ladue' },
  { slug: 'clayton-office-park', title: 'Clayton Office Park', subtitle: 'Commercial · TPO membrane', category: 'Commercial', caption: 'Photography — TPO re-roof, Clayton' },
  { slug: 'webster-groves-metal', title: 'Webster Groves Residence', subtitle: 'Residential · Standing-seam metal', category: 'Residential', caption: 'Photography — standing-seam metal, Webster Groves' },
  { slug: 'chesterfield-hail-restoration', title: 'Chesterfield Hail Restoration', subtitle: 'Residential · Before & after · Storm', category: 'Before & After', caption: 'Photography — hail damage restoration, Chesterfield' },
  { slug: 'maplewood-retail-center', title: 'Maplewood Retail Center', subtitle: 'Commercial · EPDM membrane', category: 'Commercial', caption: 'Photography — EPDM install, Maplewood' },
  { slug: 'kirkwood-tear-off', title: 'Kirkwood Full Tear-Off', subtitle: 'Residential · Before & after', category: 'Before & After', caption: 'Photography — full tear-off before/after, Kirkwood' },
];

class Component extends DCLogic {
  state = { category: 'All' };

  renderVals() {
    const categories = ['All', 'Residential', 'Commercial', 'Before & After'];
    const filters = categories.map((c) => ({
      label: c,
      cls: this.state.category === c ? 'oxr-filter oxr-filter-active' : 'oxr-filter',
      onClick: () => this.setState({ category: c }),
    }));
    const visible = this.state.category === 'All' ? PROJECTS : PROJECTS.filter((p) => p.category === this.state.category);
    const visibleProjects = visible.map((p) => ({
      ...p,
      href: `Project-Detail.dc.html?project=${p.slug}`,
      badgeTone: p.category === 'Commercial' ? 'navy' : p.category === 'Before & After' ? 'olive' : 'gold',
    }));
    return {
      filters,
      visibleProjects,
      navLinks: [
        { label: 'Home', href: 'Home.dc.html' },
        { label: 'About', href: 'About.dc.html' },
        { label: 'Services', href: 'Services.dc.html' },
        { label: 'Portfolio', href: 'Portfolio.dc.html' },
        { label: 'Financing', href: 'Financing.dc.html' },
        { label: 'FAQ', href: 'FAQ.dc.html' },
        { label: 'Contact', href: 'Contact.dc.html' },
      ],
      handleCta: () => { window.location.href = 'Contact.dc.html'; },
    };
  }
}

</script>
</body>
</html>
